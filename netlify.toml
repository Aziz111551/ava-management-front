# Déploiement lorsque le dépôt Git est le dossier parent (ex. « Multiple files »).
# Avec base = "worksphere", « publish » est relatif à CE dossier (pas worksphere/dist depuis la racine).

[build]
  base = "worksphere"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_API_URL = "https://backendagentai-production.up.railway.app"
  VITE_GOOGLE_CLIENT_ID = "1060943502441-ik8hkdqs9teqlcgqmn6sfd5j4ib5hq4s.apps.googleusercontent.com"

[functions]
  directory = "worksphere/netlify/functions"
  node_bundler = "esbuild"

# Test local : à la racine du repo, lance `npm run dev:netlify` (Vite + fonctions sur le même port proxy).
[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
