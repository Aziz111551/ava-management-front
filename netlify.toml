# Déploiement depuis la racine du dépôt pour éviter le "no content change"
# quand des commits modifient des fichiers hors de worksphere/.

[build]
  base = "."
  command = "npm ci && npm run build"
  publish = "worksphere/dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_API_URL = "https://backendagentai-production.up.railway.app"
  VITE_GOOGLE_CLIENT_ID = "1060943502441-ik8hkdqs9teqlcgqmn6sfd5j4ib5hq4s.apps.googleusercontent.com"

[functions]
  directory = "worksphere/netlify/functions"
  node_bundler = "esbuild"

# Test local : à la racine du repo, lance `npm run dev:netlify` (Vite + fonctions sur le même port proxy).
[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  publish = "worksphere/dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
